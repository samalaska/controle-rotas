<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Logístico</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<!-- MENU -->
<aside class="sidebar">
<h2>🚚 Sistema</h2>

<button onclick="mostrarAba('dashboard')">📊 Dashboard</button>
<button onclick="mostrarAba('rotas')">📦 Rotas</button>
<button onclick="mostrarAba('prazos')">⏱ Prazos</button>

</aside>

<main>

<!-- DASHBOARD -->
<section id="aba-dashboard">

<h1>Resumo Geral</h1>

<div class="cards">

<div class="cardDash">
<h3>📦 Em Rota</h3>
<p id="dashEmRota">0</p>
</div>

<div class="cardDash amarelo">
<h3>🟡 Vencendo</h3>
<p id="dashVencendo">0</p>
</div>

<div class="cardDash vermelho">
<h3>🔴 Atrasadas</h3>
<p id="dashAtrasadas">0</p>
</div>

<div class="cardDash verde">
<h3>✅ Recebidas Hoje</h3>
<p id="dashHoje">0</p>
</div>

</div>

<h2>⚠️ Rotas com Problema</h2>
<div id="alertasRotas"></div>

</section>


<!-- ROTAS -->
<section id="aba-rotas" style="display:none">

<h1>Controle de Rotas</h1>

<div class="card">
<input id="rotaInput" placeholder="Nome da rota">
<button onclick="criarRota()">Adicionar Rota</button>
</div>

<div id="rotas"></div>

</section>


<!-- PRAZOS -->
<section id="aba-prazos" style="display:none">

<h1>Prazos das Notas</h1>
<div id="painelPrazos"></div>

</section>

</main>
</div>

<script src="script.js"></script>
</body>
</html>
