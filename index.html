<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Controle de Rotas</title>

<script type="module">
import { setup } from "https://cdn.skypack.dev/twind";
setup();
</script>

</head>

<body class="flex bg-gray-100 font-sans">

<!-- SIDEBAR -->
<aside class="w-60 h-screen bg-gray-900 text-white p-4">

<h1 class="text-xl font-bold mb-6">🚚 Rotas</h1>

<button onclick="mostrarAba('rotas')" class="block mb-3">Rotas</button>
<button onclick="mostrarAba('prazos')" class="block mb-3">Prazos</button>
<button onclick="mostrarAba('dashboard')" class="block">Dashboard</button>

</aside>

<!-- CONTEÚDO -->
<main class="flex-1 p-6">

<!-- ROTAS -->
<section id="rotas">

<h2 class="text-2xl font-bold mb-4">Cadastrar Rota</h2>

<input id="rotaInput" placeholder="Nome da rota"
class="border p-2 rounded">

<button onclick="addRota()"
class="bg-blue-600 text-white px-4 py-2 rounded ml-2">
Adicionar
</button>

<input id="pesquisa"
oninput="render()"
placeholder="🔎 Pesquisar rota ou NF..."
class="border p-2 rounded w-full mt-4">

<div id="listaRotas" class="mt-6"></div>

</section>

<!-- PRAZOS -->
<section id="prazos" class="hidden">
<h2 class="text-2xl font-bold mb-4">Prazos</h2>
<div id="listaPrazos"></div>
</section>

<!-- DASHBOARD -->
<section id="dashboard" class="hidden">

<h2 class="text-2xl font-bold mb-6">Dashboard</h2>

<div class="grid grid-cols-2 gap-4">

<div class="bg-white p-4 rounded shadow">
Total Rotas
<h3 id="totalRotas" class="text-2xl font-bold"></h3>
</div>

<div class="bg-white p-4 rounded shadow">
Pendentes
<h3 id="pendentes" class="text-2xl font-bold"></h3>
</div>

<div class="bg-white p-4 rounded shadow">
Atrasadas
<h3 id="atrasadas" class="text-2xl font-bold"></h3>
</div>

<div class="bg-white p-4 rounded shadow">
Recebidas Hoje
<h3 id="recebidasHoje" class="text-2xl font-bold"></h3>
</div>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
